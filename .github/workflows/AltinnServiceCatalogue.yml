# Deploys the app to an Azure Web App via OIDC (federated credentials — no publish profile / secret).
#
# Required GitHub Actions *Variables* (Settings → Secrets and variables → Actions → Variables):
#   AZURE_WEBAPP_NAME        Name of the Azure Web App to deploy to
#   AZURE_CLIENT_ID          App registration (client) id with a federated credential for this repo
#   AZURE_TENANT_ID          Azure AD tenant id
#   AZURE_SUBSCRIPTION_ID    Subscription id of the Web App
#
# The federated credential on the app registration must have subject
#   repo:Altinn/tjenesteoversikten.no:ref:refs/heads/main
# (and/or the environment/pull_request subjects you use). Update this when the repo owner/name changes.
name: Build and deploy .NET Core application to Azure Web App
on:
  push:
    branches:
    - main
permissions:
  id-token: write
  contents: read
env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  AZURE_WEBAPP_PACKAGE_PATH: src/AltinnServiceCatalogue/AltinnServiceCatalogue.Server/publish
  CONFIGURATION: Release
  DOTNET_CORE_VERSION: 10.0.x
  WORKING_DIRECTORY: src/AltinnServiceCatalogue/AltinnServiceCatalogue.Server
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
    - name: Restore
      run: dotnet restore "${{ env.WORKING_DIRECTORY }}"
    - name: Build
      run: dotnet build "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-restore
    - name: Test
      run: dotnet test "${{ env.WORKING_DIRECTORY }}" --no-build
    - name: Publish
      run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build --output "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"
    - name: Publish Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
  deploy:
    runs-on: windows-latest
    needs: build
    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    - name: Deploy to Azure WebApp
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
